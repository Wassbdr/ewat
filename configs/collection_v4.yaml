# =============================================================================
# EWAT v4 — Collection config optimisée
# =============================================================================
# Changements vs v3 (collection.yaml) :
#
#   baseline_s    : 5m → 8m   (+3m)  16 steps — référence MMD stable
#                              DriftDetector (window_ref=5) rempli après step 5,
#                              11 steps de stable avant pré-injection
#
#   pre_injection_s: 1m → 7m  (+6m)  14 steps — couvre k*=12 steps précurseurs
#                              v3 n'avait que 2 steps : les précurseurs n'avaient
#                              aucun signal à exploiter avant l'injection
#
#   recovery_s    : 2m → 5m   (+3m)  10 steps — capture la récupération complète
#                              post-drift confirmation (post_drift_window_s=3)
#                              et la convergence vers θ_normal
#
#   cool_down_s   : 1m → 2m   (+1m)  stabilisation système entre épisodes
#
#   repetitions   : 20 → 25   (+5)   corrige les NaN sur C6/C9 (n=1 en test v3)
#                              → ~4-5 épisodes test par scénario (vs 3 en v3)
#
# Coût : 375 épisodes × ~25min moy = ~156h ≈ 6.4 jours (vs 2.4j pour v3)
# Gain : épisodes 45-54 steps (vs ~21 steps en v3) — précurseurs et drift
#        détection enfin dans leurs conditions nominales d'opération.
# =============================================================================

collection:
  namespace: ewat
  output_root: data/raw_v4

  canonical_services:
    - frontend
    - recommendation
    - cart
    - ad
    - product-catalog
    - load-generator

  prom_rate_window: "2m"
  prom_timeout_s: 30.0
  jaeger_timeout_s: 60.0
  loki_timeout_s: 30.0
  jaeger_limit: 1500
  loki_limit: 5000

  nodeport:
    node_ip: "172.16.203.12"
    prometheus_port: 31090
    jaeger_port: 31686
    loki_port: 31100

  port_forwards:
    prometheus:
      target: "svc/rancher-monitoring-prometheus"
      namespace: "cattle-monitoring-system"
      local_port: 19090
      remote_port: 9090
    jaeger:
      target: "svc/rca-jaeger-query"
      namespace: "rca-sandbox"
      local_port: 16686
      remote_port: 16686
    loki:
      target: "svc/loki-gateway"
      namespace: "monitoring-logs"
      local_port: 13100
      remote_port: 80

  # ─────────────────────────────────────────────────────────────────────────
  # Durées d'épisode — paramètre critique pour la qualité du dataset
  # ─────────────────────────────────────────────────────────────────────────
  # Chaque step = 30s (cadence Prometheus scrape).
  #
  # baseline (16 steps) :
  #   → remplit window_ref=5 du DriftDetector après step 5
  #   → 11 steps de θ_normal stable comme contexte "normal"
  #
  # pre_injection (14 steps) :
  #   → couvre k* ∈ {2,4,6,8,10,12} steps pour les précurseurs
  #   → k*=12 (6min) a 2 steps de marge avant l'injection
  #   → en v3 (2 steps), les précurseurs opèrent à l'aveugle
  #
  # recovery (10 steps) :
  #   → post_drift_window_s=3 steps confirmé avec 7 steps de marge
  #   → capture le retour à θ_normal pour les relations temporelles
  #     de l'ontologie (étape 2b)
  #
  baseline_s: "8m"
  pre_injection_s: "7m"
  recovery_s: "5m"
  cool_down_s: "2m"

  repetitions: 25

  scenarios:
    # θ_drift (benign distribution shifts)
    - drift_scale_up
    - drift_rolling_deploy
    - drift_config_change
    - drift_traffic_ramp

    # θ_anomaly — hard
    - crash
    - oom
    - network_loss

    # θ_anomaly — gray
    - intermittent_error
    - fail_slow_latency
    - fail_slow_cpu

    # θ_anomaly — contention
    - cpu_starvation
    - memory_pressure
    - noisy_neighbor
    - resource_leak

    # θ_{drift ∩ anomaly}
    - faulty_deploy_overlap
