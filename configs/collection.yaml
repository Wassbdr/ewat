collection:
  namespace: ewat
  output_root: data/raw

  # Sampling
  sample_interval_s: 30
  canonical_services:
    - frontend
    - recommendation
    - cart
    - ad
    - product-catalog
    - load-generator
  semantic:
    mode: offline

  # Segment durations
  baseline_s: 5m
  pre_injection_s: 1m
  recovery_s: 2m
  cool_down_s: 5m

  # Experiment scheduling — set to 2 for validation, 20 for the full dataset (H1/H2/H3)
  repetitions: 2

  # All 29 scenarios with injection files present.
  # Run order: hard → gray → systemic → contention → config.
  # NOTE: node_drain drains a real cluster worker node — run separately and
  #       only after coordinating with the cluster admin. Commented out below.
  scenarios:
    # ── HARD ──────────────────────────────────────────────────────────────────
    - crash
    - oom
    - network_loss
    # - image_pull_error   # out-of-scope for reduced service set
    # - node_drain         # requires draining a worker node; coordinate with admin

    # ── GRAY ──────────────────────────────────────────────────────────────────
    - intermittent_error
    - fail_slow_latency
    - fail_slow_cpu

    # ── CONTENTION ────────────────────────────────────────────────────────────
    - cpu_starvation
    - memory_pressure
    - noisy_neighbor
    - resource_leak
