# =============================================================================
# EWAT — Collection config (Phase 1: record_episode.py)
# =============================================================================
# This file drives:
#   - scripts/record_episode.py   (Phase 1 — raw telemetry dumps)
#   - scripts/build_features.py   (Phase 2 — offline feature engineering)
#   - scripts/assemble_dataset.py (Phase 3 — temporal split & final dataset)
#
# All feature-level knobs (aggregation rules, signal dims, MMD params, etc.)
# live in configs/default.yaml. This file only describes the campaign.
# =============================================================================

collection:
  # ─────────────────────────────────────────────────────────────────────────
  # Cluster scope
  # ─────────────────────────────────────────────────────────────────────────
  namespace: ewat
  output_root: data/raw

  # Canonical service set V. |V| = N is fixed across the entire dataset.
  # Chosen from the services actually active in telemetry (otel-demo,
  # probed via Jaeger /api/services + Loki label service_name):
  #   frontend, recommendation, cart, ad, product-catalog, load-generator
  canonical_services:
    - frontend
    - recommendation
    - cart
    - ad
    - product-catalog
    - load-generator

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 1 — recorder parameters
  # ─────────────────────────────────────────────────────────────────────────
  # Prometheus range-query cadence used during bulk dumps.
  # 15 s matches typical scrape intervals; smaller wastes bandwidth, larger
  # loses temporal resolution for MMD. Phase 2 resamples freely on top.
  prom_rate_window: "2m"      # PromQL rate() window applied inside templates
  prom_timeout_s: 30.0
  jaeger_timeout_s: 60.0      # bulk fetch can be heavier than per-tick
  loki_timeout_s: 30.0
  jaeger_limit: 1500          # traces per /api/traces call
  loki_limit: 5000            # log lines per Loki page (we paginate)

  # ─────────────────────────────────────────────────────────────────────────
  # NodePort endpoints (--endpoint-mode nodeport)
  # ─────────────────────────────────────────────────────────────────────────
  # Direct access to Prometheus / Jaeger / Loki via NodePort services on a
  # worker node. Avoids SPDY port-forward degradation entirely — preferred
  # mode for long-running (>1 h) collections.
  #
  # NodePorts provisioned by the cluster admin. Pod selectors:
  #   Prometheus: monitoring-metrics  (app.kubernetes.io/instance=prometheus,
  #                                    app.kubernetes.io/name=prometheus,
  #                                    app.kubernetes.io/component=server)
  #   Jaeger    : already live        (admin-provisioned)
  #   Loki      : monitoring-logs     (app.kubernetes.io/component=gateway,
  #                                    app.kubernetes.io/instance=loki,
  #                                    app.kubernetes.io/name=loki)
  nodeport:
    node_ip: "172.16.203.12"    # Ready worker node (provisioned 2026-04-27)
    prometheus_port: 31090
    jaeger_port: 31686
    loki_port: 31100

  # ─────────────────────────────────────────────────────────────────────────
  # Port-forward management (--manage-port-forwards)
  # ─────────────────────────────────────────────────────────────────────────
  # Legacy fallback — kept for one-off debugging sessions. Fresh SPDY tunnel
  # before each episode dump to avoid long-lived port-forward degradation.
  # The NodePort mode above is preferred for any multi-hour campaign.
  port_forwards:
    prometheus:
      target: "svc/rancher-monitoring-prometheus"
      namespace: "cattle-monitoring-system"
      local_port: 19090
      remote_port: 9090
    jaeger:
      target: "svc/rca-jaeger-query"   # adjust if the svc name differs (try: kubectl get svc -n rca-sandbox | grep jaeger)
      namespace: "rca-sandbox"
      local_port: 16686
      remote_port: 16686
    loki:
      target: "svc/loki-gateway"
      namespace: "monitoring-logs"
      local_port: 13100
      remote_port: 80

  # ─────────────────────────────────────────────────────────────────────────
  # Episode timeline
  # ─────────────────────────────────────────────────────────────────────────
  #   baseline → pre-injection → INJECTION (scenario.duration) → recovery
  # Total wall-clock per episode ≈ 5m + 1m + scenario.duration + 2m + cool_down
  baseline_s: "5m"
  pre_injection_s: "1m"
  recovery_s: "2m"
  cool_down_s: "1m"           # between episodes (not included in dump window)

  # Repetitions per scenario. Use 2 for validation, ≥ 20 for the final
  # dataset (H1 structurability requires enough episodes per type).
  repetitions: 20

  # ─────────────────────────────────────────────────────────────────────────
  # Scenarios — 4 regimes × scoped to 6 observable services
  # ─────────────────────────────────────────────────────────────────────────
  # θ_normal      : baseline / pre-injection windows (implicit in every episode)
  # θ_drift       : 4 benign drifts — required by H2 (drift separability)
  # θ_anomaly     : 10 failures spanning hard / gray / contention
  # θ_{drift∩ano} : 1 faulty-deploy overlap — required by look-through
  scenarios:
    # θ_drift (benign distribution shifts)
    - drift_scale_up
    - drift_rolling_deploy
    - drift_config_change
    - drift_traffic_ramp

    # θ_anomaly — hard
    - crash
    - oom
    - network_loss

    # θ_anomaly — gray
    - intermittent_error
    - fail_slow_latency
    - fail_slow_cpu

    # θ_anomaly — contention
    - cpu_starvation
    - memory_pressure
    - noisy_neighbor
    - resource_leak

    # θ_{drift ∩ anomaly}
    - faulty_deploy_overlap
