name: Data Pipeline Quality

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: |
          python -m ruff check src scripts tests

      - name: Unit tests
        run: |
          python -m pytest tests/unit -q

      - name: Collect dataset dry-run (smoke)
        run: |
          python scripts/collect_labeled.py \
            --config configs/collection_ci_smoke.yaml \
            --base-config configs/default.yaml \
            --dry-run > collect_smoke.log

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path("collect_smoke.log").read_text(encoding="utf-8")
          match = re.search(r'"run_dir"\s*:\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not extract run_dir from collect_smoke.log")

          run_dir = match.group(1)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"RUN_DIR={run_dir}\n")
          print(f"run_dir={run_dir}")
          PY

      - name: Validate dataset dry-run artifacts
        run: |
          python scripts/validate_dataset.py "$RUN_DIR"

      - name: Cleanup
        if: always()
        run: |
          rm -rf "$RUN_DIR" collect_smoke.log || true
