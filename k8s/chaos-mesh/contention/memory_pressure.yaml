apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: ewat-memory-pressure
  namespace: ewat
  labels:
    ewat.scenario: memory_pressure
    ewat.category: contention
spec:
  mode: all
  selector:
    namespaces:
      - ewat
    labelSelectors:
      app.kubernetes.io/component: recommendation
  stressors:
    memory:
      workers: 2
      size: "512MB"
  duration: "3m"
