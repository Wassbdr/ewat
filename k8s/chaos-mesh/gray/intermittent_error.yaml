apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: ewat-intermittent-error
  namespace: ewat
  labels:
    ewat.scenario: intermittent_error
    ewat.category: gray
spec:
  mode: all
  selector:
    namespaces:
      - ewat
    labelSelectors:
      app.kubernetes.io/component: productcatalog
  target: Request
  port: 8080
  abort: true
  duration: "3m"
