apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: ewat-fail-slow-cpu
  namespace: ewat
  labels:
    ewat.scenario: fail_slow_cpu
    ewat.category: gray
spec:
  mode: all
  selector:
    namespaces:
      - ewat
    labelSelectors:
      app.kubernetes.io/component: frontend
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "3m"
