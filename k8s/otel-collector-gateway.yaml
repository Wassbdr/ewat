---
# Central OTel Collector Deployment — replaces the stuck DaemonSet agents
# Reason: DaemonSet agents (otel-collector-agent) are all Pending because
#         Datadog agents claim hostPort 4317 on every worker node.
#         This Deployment uses NO hostPorts (ClusterIP only), and matches
#         the existing otel-collector Service selector so apps immediately
#         get a working OTLP target.
#
# Metrics pipeline: app OTLP metrics → prometheus exporter on :9464 →
#   Prometheus kubernetes-pods scrape job → available for EWAT collector
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-gateway
  namespace: ewat
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.deployment.name
            - k8s.container.name
            - service.name
            - service.namespace
      batch:
        send_batch_size: 1000
        timeout: 5s

    exporters:
      otlp/jaeger:
        endpoint: "rca-jaeger.rca-sandbox.svc.cluster.local:4317"
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 100
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
      otlphttp/loki:
        endpoint: "http://loki-gateway.monitoring-logs.svc.cluster.local:80/otlp"
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
      # Expose received OTLP app metrics as a Prometheus scrape endpoint.
      # The monitoring-metrics Prometheus kubernetes-pods job discovers this
      # via the prometheus.io/scrape annotations on the pod.
      prometheus:
        endpoint: "0.0.0.0:9464"
        namespace: "otel"
        enable_open_metrics: false
        resource_to_telemetry_conversion:
          enabled: true
      debug:
        verbosity: normal

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof: {}

    service:
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [k8sattributes, memory_limiter, batch]
          exporters: [otlp/jaeger]
        logs:
          receivers: [otlp]
          processors: [k8sattributes, memory_limiter, batch]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          processors: [k8sattributes, memory_limiter, batch]
          exporters: [prometheus]
      telemetry:
        logs:
          level: info
        metrics:
          level: normal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-gateway
  namespace: ewat
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: ewat-demo
    component: agent-collector
    app.kubernetes.io/component: gateway-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/instance: ewat-demo
      component: agent-collector
      app.kubernetes.io/component: gateway-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/instance: ewat-demo
        component: agent-collector
        app.kubernetes.io/component: gateway-collector
      annotations:
        # Prometheus kubernetes-pods scrape job will discover this endpoint
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: opentelemetry-collector
          image: otel/opentelemetry-collector-contrib:0.142.0
          args:
            - --config=/conf/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
            - name: prom-metrics
              containerPort: 9464
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-gateway
            items:
              - key: config.yaml
                path: config.yaml
